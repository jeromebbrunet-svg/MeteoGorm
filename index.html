<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciel Ouvert — Météo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f0c060;
  --text:#e8f0fc;
  --text-muted:#7a9ec8;
  --col-morning:#f9d97a;
  --col-noon:#c8deff;
  --col-evening:#c07adc;
  --col-max:#ff7070;
  --col-min:#70b8ff;
  --tint-clear:rgba(80,160,255,0.13);
  --tint-cloudy:rgba(130,145,170,0.19);
  --tint-fog:rgba(165,168,180,0.20);
  --tint-drizzle:rgba(90,150,220,0.16);
  --tint-rain:rgba(55,95,200,0.21);
  --tint-snow:rgba(190,215,255,0.19);
  --tint-storm:rgba(75,35,155,0.24);
  --tint-shower:rgba(75,135,200,0.16);
  --tint-default:rgba(255,255,255,0.04);
}
body{
  min-height:100vh;
  background:linear-gradient(155deg,#081524 0%,#0d2244 45%,#0a1830 100%);
  font-family:'DM Sans',sans-serif;color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  padding:2rem 1rem 5rem;overflow-x:hidden;
}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite;opacity:0}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--op,.6)}}
.app{position:relative;z-index:1;width:100%;max-width:860px}

/* Header */
header{text-align:center;margin-bottom:2.5rem}
.logo{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3rem);letter-spacing:-.02em;margin-bottom:.25rem}
.logo em{font-style:italic;color:var(--gold)}
.subtitle{font-size:.78rem;color:var(--text-muted);font-weight:300;letter-spacing:.12em;text-transform:uppercase}

/* Search */
.search-box{display:flex;gap:.7rem;margin-bottom:2.5rem}
.search-input{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.16);border-radius:12px;padding:.85rem 1.1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:300;outline:none;transition:background .2s,border-color .2s}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.32)}
.search-btn{background:var(--gold);border:none;border-radius:12px;padding:.85rem 1.4rem;color:#1a0e00;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:.4rem;transition:background .2s,transform .1s}
.search-btn:hover{background:#f5d080}
.search-btn:active{transform:scale(.97)}
.search-btn svg{width:15px;height:15px;flex-shrink:0}
.geo-btn{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);
  border-radius:12px;padding:.85rem;color:var(--text-muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s,transform .1s;flex-shrink:0;
}
.geo-btn:hover{background:rgba(255,255,255,0.15);color:var(--gold)}
.geo-btn:active{transform:scale(.97)}
.geo-btn svg{width:18px;height:18px}

/* Feedback */
.error-msg{text-align:center;color:#f5a0a0;font-size:.88rem;margin-bottom:1.5rem;display:none}
.error-msg.visible{display:block}
.loader{text-align:center;color:var(--text-muted);font-size:.88rem;margin:2rem 0;display:none}
.loader.visible{display:block}
.loader-dot{display:inline-block;animation:bounce 1.4s ease-in-out infinite;margin:0 2px}
.loader-dot:nth-child(2){animation-delay:.2s}
.loader-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
#weather-output{display:none}
#weather-output.visible{display:block}

/* Location */
.location-header{text-align:center;margin-bottom:1.8rem}
.location-name{font-family:'DM Serif Display',serif;font-size:clamp(1.5rem,4vw,2.2rem);font-weight:400;letter-spacing:-.01em}
.location-country{font-size:.8rem;color:var(--text-muted);font-weight:300;letter-spacing:.05em;margin-top:.2rem}

/* Today hero */
.today-hero{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:1.5rem 1.8rem;margin-bottom:1.6rem;display:grid;grid-template-columns:1fr auto;gap:1.2rem;align-items:center}
.today-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.13em;color:var(--text-muted);font-weight:500;margin-bottom:.35rem}
.today-temp{font-family:'DM Serif Display',serif;font-size:clamp(2.8rem,7vw,4.5rem);line-height:1;color:var(--gold)}
.today-desc{font-size:.92rem;color:var(--text-muted);font-weight:300;margin-top:.3rem}
.today-minmax{font-size:.8rem;color:var(--text-muted);margin-top:.2rem}
.today-sun-block{text-align:right}
.sun-item{display:flex;align-items:center;justify-content:flex-end;gap:.5rem;margin-bottom:.55rem}
.sun-item:last-child{margin-bottom:0}
.sun-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:500}
.sun-time{font-size:.95rem;font-weight:500;color:var(--gold);font-variant-numeric:tabular-nums}
.sun-icon{width:17px;height:17px;flex-shrink:0;color:var(--gold)}

/* Chart */
.chart-wrap{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);border-radius:18px;padding:1.1rem 1rem 1rem;margin-bottom:1.4rem;overflow:hidden}
.chart-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.9rem;padding:0 .3rem;gap:1rem;flex-wrap:wrap}
.chart-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);font-weight:500}
.chart-legend{display:flex;gap:.75rem;flex-wrap:wrap}
.cl-item{display:flex;align-items:center;gap:.32rem;font-size:.63rem;color:var(--text-muted);letter-spacing:.04em}
.cl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cl-dashed{width:16px;height:0;border-top:2px dashed currentColor;flex-shrink:0}
.cl-morning{background:var(--col-morning)}
.cl-noon{background:var(--col-noon)}
.cl-evening{background:var(--col-evening)}
.cl-max-c{color:var(--col-max)}
.cl-min-c{color:var(--col-min)}
/* Hours info badge inside legend */
.legend-hours-info{
  font-size:.62rem;color:rgba(122,158,200,0.7);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:6px;padding:.18rem .55rem;
  white-space:nowrap;letter-spacing:.03em;
  align-self:center;
}
#temp-chart{width:100%;display:block;overflow:visible}
.chart-outer{position:relative}
.chart-tooltip{position:absolute;background:rgba(8,18,36,0.94);border:1px solid rgba(255,255,255,0.14);border-radius:8px;padding:.4rem .65rem;font-size:.7rem;color:var(--text);pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .15s;z-index:10}

/* Day cards */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.5rem;margin-bottom:1.8rem}
@media(max-width:640px){.week-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:400px){.week-grid{grid-template-columns:repeat(2,1fr)}}
.day-card{
  background:rgba(10,20,40,0.55);border:1px solid rgba(255,255,255,0.10);
  border-radius:14px;padding:.75rem .5rem;text-align:center;
  position:relative;overflow:hidden;
  transition:transform .18s,filter .18s,border-color .18s;
  cursor:pointer;
}
.day-card:hover{transform:translateY(-2px);filter:brightness(1.12)}
.day-card.today{border-color:var(--gold);background:rgba(240,192,96,0.07)}
.day-card.selected{border-color:#a0c8ff !important;box-shadow:0 0 0 2px rgba(160,200,255,0.2)}
.day-card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:var(--slot-tint,var(--tint-default));pointer-events:none}
.dc-name{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;font-weight:500;color:var(--text-muted);margin-bottom:.15rem;position:relative}
.day-card.today .dc-name{color:var(--gold)}
.day-card.selected .dc-name{color:#a0c8ff}
.dc-date{font-size:.58rem;color:var(--text-muted);opacity:.7;margin-bottom:.5rem;font-variant-numeric:tabular-nums;position:relative}
.dc-minmax{display:flex;justify-content:center;gap:.3rem;font-size:.72rem;font-variant-numeric:tabular-nums;margin-bottom:.55rem;position:relative}
.dc-max{color:var(--col-max);font-weight:500}
.dc-min{color:var(--col-min)}
.dc-moments{display:flex;flex-direction:column;gap:.3rem;position:relative}
.dc-moment-row{display:flex;align-items:center;justify-content:space-between;padding:.18rem .3rem;border-radius:6px;background:rgba(255,255,255,0.04)}
.dcm-label{font-size:.55rem;text-transform:uppercase;letter-spacing:.09em;font-weight:500;min-width:22px}
.dcm-label-m{color:var(--col-morning)}
.dcm-label-n{color:var(--col-noon)}
.dcm-label-e{color:var(--col-evening)}
.dcm-icon{line-height:1;display:flex;align-items:center;justify-content:center}
.dcm-icon svg{width:18px;height:18px}
.dcm-temp{font-size:.75rem;font-weight:500;font-variant-numeric:tabular-nums;color:var(--text)}
.dc-sun{display:flex;flex-direction:column;gap:.15rem;margin-top:.5rem;padding-top:.45rem;border-top:1px solid rgba(255,255,255,0.08);position:relative}
.dc-sun-row{display:flex;align-items:center;justify-content:center;gap:.25rem;font-size:.58rem;color:var(--text-muted);font-variant-numeric:tabular-nums}
.dc-sun-row svg{width:9px;height:9px;color:var(--gold);flex-shrink:0}
.dc-moments .dcm-icon svg{width:16px;height:16px}

/* ── Detail panel ── */
#detail-panel{
  display:none;
  background:rgba(8,18,40,0.85);
  border:1px solid rgba(160,200,255,0.25);
  border-radius:18px;
  padding:1.4rem 1.3rem 1.2rem;
  margin-bottom:1.8rem;
  animation:slideIn .22s ease;
}
#detail-panel.visible{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.dp-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.1rem;gap:1rem;flex-wrap:wrap;
}
.dp-title{font-family:'DM Serif Display',serif;font-size:1.15rem;font-weight:400;color:var(--text)}
.dp-sub{font-size:.72rem;color:var(--text-muted);font-weight:300;margin-top:.1rem}
.dp-close{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);
  border-radius:8px;padding:.3rem .65rem;color:var(--text-muted);font-size:.72rem;
  cursor:pointer;transition:background .15s;letter-spacing:.04em;white-space:nowrap;
}
.dp-close:hover{background:rgba(255,255,255,0.14)}

/* Hourly mini-chart */
.dp-chart-outer{position:relative;margin-bottom:1.1rem}
#detail-chart{width:100%;display:block;overflow:visible}

/* Hourly scroll strip */
.dp-strip{
  display:grid;
  grid-auto-flow:column;
  grid-auto-columns:52px;
  gap:.45rem;
  overflow-x:auto;
  padding-bottom:.5rem;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,0.15) transparent;
}
.dp-strip::-webkit-scrollbar{height:4px}
.dp-strip::-webkit-scrollbar-track{background:transparent}
.dp-strip::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}

.dp-hour{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
  padding:.45rem .3rem;
  text-align:center;
  flex-shrink:0;
  transition:background .15s;
}
.dp-hour.is-morning{border-color:rgba(249,217,122,0.35);background:rgba(249,217,122,0.06)}
.dp-hour.is-noon   {border-color:rgba(200,222,255,0.35);background:rgba(200,222,255,0.05)}
.dp-hour.is-evening{border-color:rgba(192,122,220,0.35);background:rgba(192,122,220,0.06)}
.dp-hour.is-night  {background:rgba(10,20,50,0.6)}
.dph-time{font-size:.62rem;color:var(--text-muted);font-variant-numeric:tabular-nums;margin-bottom:.3rem;font-weight:500}
.dph-icon{line-height:1;margin-bottom:.25rem;display:flex;align-items:center;justify-content:center;min-height:24px}
.dph-icon svg{width:22px;height:22px}
.dph-temp{font-size:.78rem;font-weight:500;color:var(--text);font-variant-numeric:tabular-nums;margin-bottom:.2rem}
.dph-hum{
  font-size:.6rem;color:#70b8ff;font-variant-numeric:tabular-nums;
  display:flex;align-items:center;justify-content:center;gap:.18rem;
}
.dph-hum svg{width:8px;height:8px;flex-shrink:0}



.footer-note{display:block;text-align:center;font-size:.7rem;color:var(--text-muted);opacity:.45;margin-top:1.8rem;letter-spacing:.04em}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="app">
  <header>
    <div class="logo">Ciel <em>Ouvert</em></div>
    <div class="subtitle">Météo de la semaine · Matin · Midi · Soir</div>
  </header>

  <div class="search-box">
    <input class="search-input" id="place-input" type="text" placeholder="Paris, Tokyo, New York…" autocomplete="off"/>
    <button class="geo-btn" id="geo-btn" title="Ma position">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 3"/></svg>
    </button>
    <button class="search-btn" id="search-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Rechercher
    </button>
  </div>

  <div class="error-msg" id="error-msg"></div>
  <div class="loader" id="loader">Récupération des données<span class="loader-dot">.</span><span class="loader-dot">.</span><span class="loader-dot">.</span></div>

  <div id="weather-output">
    <div class="location-header">
      <div class="location-name" id="loc-name"></div>
      <div class="location-country" id="loc-country"></div>
    </div>

    <div class="today-hero">
      <div>
        <div class="today-label">En ce moment</div>
        <div class="today-temp" id="today-temp"></div>
        <div class="today-desc" id="today-desc"></div>
        <div class="today-minmax" id="today-minmax"></div>
      </div>
      <div class="today-sun-block">
        <div class="sun-item">
          <div><div class="sun-label">Lever</div><div class="sun-time" id="today-sunrise"></div></div>
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v3M4.22 10.22l2.12 2.12M1 18h3M20 18h3M17.66 12.34l2.12-2.12M12 6a6 6 0 0 1 6 6M2 18a10 10 0 0 1 20 0"/></svg>
        </div>
        <div class="sun-item">
          <div><div class="sun-label">Coucher</div><div class="sun-time" id="today-sunset"></div></div>
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10v3M4.22 13.78l2.12 2.12M1 18h3M20 18h3M17.66 15.66l2.12 2.12M12 6a6 6 0 0 1 6 6M2 22a10 10 0 0 1 20 0"/></svg>
        </div>
      </div>
    </div>

    <!-- Weekly chart -->
    <div class="chart-wrap">
      <div class="chart-top">
        <div>
          <div class="chart-title">Températures · 7 jours</div>
        </div>
        <div class="chart-legend">
          <div class="cl-item"><div class="cl-dot cl-morning"></div><span>Matin <span style="opacity:.6">(8h)</span></span></div>
          <div class="cl-item"><div class="cl-dot cl-noon"></div><span>Midi <span style="opacity:.6">(13h)</span></span></div>
          <div class="cl-item"><div class="cl-dot cl-evening"></div><span>Soir <span style="opacity:.6">(19h)</span></span></div>
          <div class="cl-item cl-max-c"><div class="cl-dashed"></div>Max</div>
          <div class="cl-item cl-min-c"><div class="cl-dashed"></div>Min</div>
          <div class="legend-hours-info">💡 Cliquez une journée pour le détail heure par heure</div>
        </div>
      </div>
      <div class="chart-outer">
        <svg id="temp-chart" height="210"></svg>
        <div class="chart-tooltip" id="chart-tooltip"></div>
      </div>
    </div>

    <!-- Day cards -->
    <div class="week-grid" id="week-grid"></div>

    <!-- Detail panel (appears after week grid on click) -->
    <div id="detail-panel">
      <div class="dp-header">
        <div>
          <div class="dp-title" id="dp-title"></div>
          <div class="dp-sub" id="dp-sub"></div>
        </div>
        <button class="dp-close" id="dp-close">✕ Fermer</button>
      </div>
      <div class="dp-chart-outer">
        <svg id="detail-chart" height="180"></svg>
      </div>
    </div>

    <span class="footer-note">Données : Open-Meteo &amp; Open-Meteo Geocoding · Mise à jour en temps réel</span>
  </div>
</div>

<script>
const DAYS_FULL=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const DAYS_SHORT=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTHS=['jan.','fév.','mar.','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];
const MONTHS_FULL=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

const WMO_DESC={
  0:'Ciel dégagé',1:'Principalement dégagé',2:'Partiellement nuageux',3:'Couvert',
  45:'Brouillard',48:'Brouillard givrant',
  51:'Bruine légère',53:'Bruine modérée',55:'Bruine dense',
  61:'Pluie légère',63:'Pluie modérée',65:'Pluie forte',
  71:'Neige légère',73:'Neige modérée',75:'Neige forte',77:'Grésil',
  80:'Averses légères',81:'Averses modérées',82:'Averses violentes',
  85:'Averses de neige',86:'Averses de neige fortes',
  95:'Orage',96:'Orage avec grêle',99:'Orage violent avec grêle'
};
/* SVG weather icons — universal, no font/emoji dependency */
const _SVG={
  sun:`<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#f9d97a" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4" fill="#f9d97a" stroke="none"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="19.78" y1="4.22" x2="17.66" y2="6.34"/><line x1="6.34" y1="17.66" x2="4.22" y2="19.78"/></svg>`,
  suncld:`<svg viewBox="0 0 26 22" width="26" height="22" fill="none"><circle cx="9" cy="9" r="4" fill="#f9d97a"/><line x1="9" y1="1" x2="9" y2="3.5" stroke="#f9d97a" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="9" x2="3.5" y2="9" stroke="#f9d97a" stroke-width="1.8" stroke-linecap="round"/><line x1="3.05" y1="3.05" x2="4.8" y2="4.8" stroke="#f9d97a" stroke-width="1.8" stroke-linecap="round"/><line x1="14.95" y1="3.05" x2="13.2" y2="4.8" stroke="#f9d97a" stroke-width="1.8" stroke-linecap="round"/><path d="M13 18H6a4 4 0 0 1 0-8 5 5 0 0 1 9.9 1A3.5 3.5 0 0 1 19.5 14.5 3.5 3.5 0 0 1 16 18H13z" fill="#c8deff" stroke="#a0b8d8" stroke-width="1.2"/></svg>`,
  cloud:`<svg viewBox="0 0 24 18" width="24" height="18" fill="none"><path d="M18 16H6a5 5 0 0 1 0-10 6 6 0 0 1 11.9 1.5A4 4 0 0 1 22 11.5 4 4 0 0 1 18 16z" fill="#c8deff" stroke="#a0b8d8" stroke-width="1.4"/></svg>`,
  fog:`<svg viewBox="0 0 24 18" width="24" height="18" fill="none"><line x1="3" y1="5" x2="21" y2="5" stroke="#c8deff" stroke-width="1.8" stroke-linecap="round"/><line x1="3" y1="10" x2="21" y2="10" stroke="#c8deff" stroke-width="1.8" stroke-linecap="round"/><line x1="5" y1="15" x2="19" y2="15" stroke="#c8deff" stroke-width="1.8" stroke-linecap="round"/></svg>`,

function getIcon(c){
  if(c===0)return _SVG.sun;
  if(c===1)return _SVG.suncld;
  if(c===2)return _SVG.suncld;
  if(c===3)return _SVG.cloud;
  if(c===45||c===48)return _SVG.fog;
  if(c===51||c===53||c===55)return _SVG.drizzle;
  if(c===56||c===57)return _SVG.drizzle;   /* bruine verglaçante */
  if(c===61||c===63||c===65)return _SVG.rain;
  if(c===66||c===67)return _SVG.rain;       /* pluie verglaçante */
  if(c===71||c===73||c===75)return _SVG.snow;
  if(c===77)return _SVG.snow;               /* grésil */
  if(c===80||c===81||c===82)return _SVG.shower;
  if(c===85||c===86)return _SVG.snow;
  if(c===95)return _SVG.storm;
  if(c===96||c===99)return _SVG.hail;
  return _SVG.cloud; /* fallback = couvert, jamais vide */
}

/* Short label shown under icon in detail chart */
function getIconLabel(c){

  if(c>=80&&c<=82)return'Averse';
  if(c>=85&&c<=86)return'Neige↓';

}

   WEEKLY CHART
══════════════════════════════════════════════ */
function renderChart(daily,hMap,hourly){
  const svg=document.getElementById('temp-chart');
  const W=svg.parentElement.clientWidth||800;
  const H=210;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width',W);
  svg.innerHTML='';

  const PL=38,PR=16,PT=24,PB=30;
  const CW=W-PL-PR,CH=H-PT-PB,n=daily.time.length;

  const temps={morning:[],noon:[],evening:[],max:[],min:[]};
  daily.time.forEach((dateStr,i)=>{
    [[8,'morning'],[13,'noon'],[19,'evening']].forEach(([h,k])=>{
      const key=`${dateStr}T${String(h).padStart(2,'0')}:00`;
      const idx=hMap[key];
      temps[k].push(idx!=null?Math.round(hourly.temperature_2m[idx]):Math.round(daily.temperature_2m_max[i]));
    });
    temps.max.push(Math.round(daily.temperature_2m_max[i]));
    temps.min.push(Math.round(daily.temperature_2m_min[i]));
  });

  const allV=[...temps.morning,...temps.noon,...temps.evening,...temps.max,...temps.min];
  const minT=Math.min(...allV)-2,maxT=Math.max(...allV)+2,range=maxT-minT||1;
  const tx=i=>PL+(i/(n-1))*CW;
  const ty=t=>PT+(1-(t-minT)/range)*CH;

  function smooth(pts){
    if(pts.length<2)return'';
    let d=`M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
    for(let i=0;i<pts.length-1;i++){
      const cp1x=pts[i][0]+(pts[i+1][0]-pts[i][0])*.45, cp1y=pts[i][1];
      const cp2x=pts[i+1][0]-(pts[i+1][0]-pts[i][0])*.45, cp2y=pts[i+1][1];
      d+=` C ${cp1x.toFixed(1)} ${cp1y.toFixed(1)}, ${cp2x.toFixed(1)} ${cp2y.toFixed(1)}, ${pts[i+1][0].toFixed(1)} ${pts[i+1][1].toFixed(1)}`;
    }
    return d;
  }
  function area(pts){
    const base=PT+CH;
    return smooth(pts)+` L ${pts[pts.length-1][0].toFixed(1)} ${base} L ${pts[0][0].toFixed(1)} ${base} Z`;
  }

  const ns='http://www.w3.org/2000/svg';
  function el(tag,attrs,parent){
    const e=document.createElementNS(ns,tag);
    Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
    if(parent)parent.appendChild(e);
    return e;
  }

  const defs=el('defs',{},svg);
  [{id:'gm',c:'#f9d97a'},{id:'gn',c:'#c8deff'},{id:'ge',c:'#c07adc'}].forEach(g=>{
    const lg=el('linearGradient',{id:g.id,x1:'0',y1:'0',x2:'0',y2:'1'},defs);
    el('stop',{'offset':'0%','stop-color':g.c,'stop-opacity':'.9'},lg);
    el('stop',{'offset':'100%','stop-color':g.c,'stop-opacity':'0'},lg);
  });

  for(let s=0;s<=4;s++){
    const t=minT+(range/4)*s,y=ty(t);
    el('line',{x1:PL,y1:y,x2:PL+CW,y2:y,stroke:'rgba(255,255,255,0.07)','stroke-width':'1'},svg);
    const lb=el('text',{x:PL-5,y:y+4,fill:'#7a9ec8','font-size':'10','font-family':'DM Sans,sans-serif','text-anchor':'end'},svg);
    lb.textContent=Math.round(t)+'°';
  }

  const tooltip=document.getElementById('chart-tooltip'),outer=svg.parentElement;

  daily.time.forEach((dateStr,i)=>{
    const d=new Date(dateStr+'T12:00:00');
    const lbl=i===0?'Auj.':DAYS_SHORT[d.getDay()];
    const x=tx(i);
    el('line',{x1:x,y1:PT,x2:x,y2:PT+CH,stroke:'rgba(255,255,255,0.05)','stroke-width':'1','stroke-dasharray':'3,4'},svg);
    const t=el('text',{x,y:H-6,fill:'#7a9ec8','font-size':'10','font-family':'DM Sans,sans-serif','text-anchor':'middle'},svg);
    t.textContent=lbl;
  });

  function makeDot(x,y,color,label,dateStr,temp){
    const c=el('circle',{cx:x,cy:y,r:'4',fill:'#081524',stroke:color,'stroke-width':'2',style:'cursor:pointer;transition:r .15s'},svg);
    c.addEventListener('mouseenter',()=>{
      const d=new Date(dateStr+'T12:00:00');
      tooltip.innerHTML=`<span style="color:${color};font-weight:500">${label}</span>&nbsp;&nbsp;${d.getDate()} ${MONTHS[d.getMonth()]} · <strong>${temp}°</strong>`;
      const rb=outer.getBoundingClientRect(),cb=c.getBoundingClientRect();
      tooltip.style.left=(cb.left-rb.left+10)+'px';
      tooltip.style.top=(cb.top-rb.top-48)+'px';
      tooltip.style.opacity='1';
      c.setAttribute('r','6');
    });
    c.addEventListener('mouseleave',()=>{tooltip.style.opacity='0';c.setAttribute('r','4')});
  }

  const solid=[
    {k:'morning',color:'#f9d97a',gid:'gm',label:'Matin 8h',op:'.16'},
    {k:'noon',   color:'#c8deff',gid:'gn',label:'Midi 13h',op:'.13'},
    {k:'evening',color:'#c07adc',gid:'ge',label:'Soir 19h',op:'.15'},
  ];
  solid.forEach(s=>{
    const pts=temps[s.k].map((t,i)=>[tx(i),ty(t)]);
    el('path',{d:area(pts),fill:`url(#${s.gid})`,opacity:s.op},svg);
    el('path',{d:smooth(pts),fill:'none',stroke:s.color,'stroke-width':'2.2','stroke-linecap':'round','stroke-linejoin':'round'},svg);
  });

  const dashed=[{k:'max',color:'#ff7070',label:'Max'},{k:'min',color:'#70b8ff',label:'Min'}];
  dashed.forEach(s=>{
    const pts=temps[s.k].map((t,i)=>[tx(i),ty(t)]);
    el('path',{d:smooth(pts),fill:'none',stroke:s.color,'stroke-width':'1.6','stroke-dasharray':'5,4','stroke-linecap':'round'},svg);
  });

  const offsets={morning:-10,noon:-18,evening:-26};
  solid.forEach(s=>{
    temps[s.k].forEach((t,i)=>{
      const x=tx(i),y=ty(t);
      const lb=el('text',{x,y:y+offsets[s.k],fill:s.color,'font-size':'9.5','font-family':'DM Sans,sans-serif','font-weight':'500','text-anchor':'middle'},svg);
      lb.textContent=t+'°';
    });
  });

  solid.forEach(s=>temps[s.k].forEach((t,i)=>makeDot(tx(i),ty(t),s.color,s.label,daily.time[i],t)));
  dashed.forEach(s=>temps[s.k].forEach((t,i)=>makeDot(tx(i),ty(t),s.color,s.label,daily.time[i],t)));
}

/* ══════════════════════════════════════════════
   DETAIL PANEL (hourly)

function getMomentClass(h){
  if(h>=6&&h<11) return'is-morning';
  if(h>=11&&h<16)return'is-noon';
  if(h>=16&&h<22)return'is-evening';
  return'is-night';
}

function renderDetailChart(hours){
  const svg=document.getElementById('detail-chart');
  const W=svg.parentElement.clientWidth||800;
  /* Extra bottom padding to fit hour label + icon row + hum row */
  const ICON_ROW=22, HUM_ROW=16, LABEL_ROW=48;
  const PL=30,PR=12,PT=22,PB=14+ICON_ROW+HUM_ROW+LABEL_ROW;
  const H=PT+80+PB;
  const CW=W-PL-PR, CH=80, n=hours.length;

  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width',W);
  svg.setAttribute('height',H);
  svg.innerHTML='';

  const ns='http://www.w3.org/2000/svg';
  function el(tag,attrs,parent){
    const e=document.createElementNS(ns,tag);
    Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
    if(parent)parent.appendChild(e);
    return e;
  }
  function fo(x,y,w,h,html,parent){
    const f=document.createElementNS(ns,'foreignObject');
    f.setAttribute('x',x);f.setAttribute('y',y);
    f.setAttribute('width',w);f.setAttribute('height',h);
    f.innerHTML=`<div xmlns="http://www.w3.org/1999/xhtml" style="width:${w}px;height:${h}px;display:flex;align-items:center;justify-content:center">${html}</div>`;
    if(parent)parent.appendChild(f);
    return f;
  }

  const temps=hours.map(x=>x.temp);
  const minT=Math.min(...temps)-2, maxT=Math.max(...temps)+2, rangeT=maxT-minT||1;
  const tx=i=>PL+(i/(n-1))*CW;
  const ty=t=>PT+(1-(t-minT)/rangeT)*CH;

  /* Humidity bars */
  const barW=Math.max(4,CW/n*0.5);
  hours.forEach((x,i)=>{
    const bH=(x.hum/100)*CH*0.65;
    el('rect',{x:tx(i)-barW/2,y:PT+CH-bH,width:barW,height:bH,fill:'rgba(112,184,255,0.13)',rx:'2'},svg);
  });

  /* Grid */
  [0,.5,1].forEach(f=>{
    const t=minT+rangeT*f, y=ty(t);
    el('line',{x1:PL,y1:y,x2:PL+CW,y2:y,stroke:'rgba(255,255,255,0.06)','stroke-width':'1'},svg);
    const lb=el('text',{x:PL-4,y:y+3.5,fill:'#7a9ec8','font-size':'9','font-family':'DM Sans,sans-serif','text-anchor':'end'},svg);
    lb.textContent=Math.round(t)+'°';
  });

  /* Smooth curve */
  function smooth(pts){
    if(pts.length<2)return'';
    let d=`M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
    for(let i=0;i<pts.length-1;i++){
      const cp1x=pts[i][0]+(pts[i+1][0]-pts[i][0])*.45,cp1y=pts[i][1];
      const cp2x=pts[i+1][0]-(pts[i+1][0]-pts[i][0])*.45,cp2y=pts[i+1][1];
      d+=` C ${cp1x.toFixed(1)} ${cp1y.toFixed(1)}, ${cp2x.toFixed(1)} ${cp2y.toFixed(1)}, ${pts[i+1][0].toFixed(1)} ${pts[i+1][1].toFixed(1)}`;
    }
    return d;
  }

  const defs=el('defs',{},svg);
  const lg=el('linearGradient',{id:'dc-g',x1:'0',y1:'0',x2:'0',y2:'1'},defs);
  el('stop',{'offset':'0%','stop-color':'#c8deff','stop-opacity':'.7'},lg);
  el('stop',{'offset':'100%','stop-color':'#c8deff','stop-opacity':'0'},lg);

  const pts=hours.map((x,i)=>[tx(i),ty(x.temp)]);
  el('path',{d:smooth(pts)+` L ${pts[pts.length-1][0].toFixed(1)} ${PT+CH} L ${pts[0][0].toFixed(1)} ${PT+CH} Z`,fill:'url(#dc-g)',opacity:'.18'},svg);
  el('path',{d:smooth(pts),fill:'none',stroke:'#c8deff','stroke-width':'2','stroke-linecap':'round'},svg);

  pts.forEach(([x,y],i)=>{
    el('circle',{cx:x,cy:y,r:'3',fill:'#081524',stroke:'#c8deff','stroke-width':'1.8'},svg);
    el('text',{x,y:y-7,fill:'#c8deff','font-size':'9','font-family':'DM Sans,sans-serif','font-weight':'500','text-anchor':'middle'},svg)
      .textContent=hours[i].temp+'°';
  });

  /* === Below curve: hour · icon · humidity · vertical label === */
  const Y_HOUR = PT+CH+10;
  const Y_ICON  = Y_HOUR+14;
  const Y_HUM   = Y_ICON+ICON_ROW+4;
  const Y_LABEL = Y_HUM+HUM_ROW+6;

  hours.forEach((x,i)=>{
    const cx=tx(i);

    /* Vertical separator line */
    el('line',{x1:cx,y1:PT+CH+2,x2:cx,y2:Y_HOUR-2,stroke:'rgba(255,255,255,0.07)','stroke-width':'1'},svg);

    /* Hour label */
    el('text',{x:cx,y:Y_HOUR,fill:'#7a9ec8','font-size':'9','font-family':'DM Sans,sans-serif','text-anchor':'middle','font-weight':'500'},svg)
      .textContent=String(x.h).padStart(2,'0')+'h';

    /* Weather icon */
    fo(cx-11,Y_ICON,22,22,getIcon(x.code),svg);

    /* Humidity */
    const humColor=x.hum>=80?'#70b8ff':x.hum>=50?'#a0c8e8':'#7a9ec8';
    el('text',{x:cx,y:Y_HUM+12,fill:humColor,'font-size':'8.5','font-family':'DM Sans,sans-serif','text-anchor':'middle'},svg)
      .textContent=x.hum+'%';

    /* Weather label — vertical, rotated -90° around its anchor */
    const lt=el('text',{
      x:cx, y:Y_LABEL,
      fill:'#566e8a',
      'font-size':'8',
      'font-family':'DM Sans,sans-serif',
      'text-anchor':'end',
      transform:`rotate(-90,${cx},${Y_LABEL})`
    },svg);
    lt.textContent=getIconLabel(x.code);
  });
}

function openDetail(dayIndex){
  const daily=_data.daily;
  const hourly=_data.hourly;
  const dateStr=daily.time[dayIndex];
  const d=new Date(dateStr+'T12:00:00');
  const isToday=dayIndex===0;
  const dayLabel=isToday?'Aujourd\'hui':DAYS_FULL[d.getDay()];
  const dateLabel=`${d.getDate()} ${MONTHS_FULL[d.getMonth()]}`;

  document.getElementById('dp-title').textContent=`${dayLabel} — ${dateLabel}`;
  document.getElementById('dp-sub').textContent=`Lever ${fmtTime(daily.sunrise[dayIndex])} · Coucher ${fmtTime(daily.sunset[dayIndex])} · Max ${Math.round(daily.temperature_2m_max[dayIndex])}° / Min ${Math.round(daily.temperature_2m_min[dayIndex])}°`;

  /* Collect every 2 hours: 0,2,4,...,22 */
  const hourSlots=[];
  for(let h=0;h<24;h+=2){
    const key=`${dateStr}T${String(h).padStart(2,'0')}:00`;
    const idx=_hMap[key];
    if(idx!=null){
      hourSlots.push({
        h,
        temp:Math.round(hourly.temperature_2m[idx]),
        code:hourly.weather_code[idx],
        hum:Math.round(hourly.relative_humidity_2m[idx])
      });
    }
  }

  /* Mini chart */
  requestAnimationFrame(()=>renderDetailChart(hourSlots));

  const panel=document.getElementById('detail-panel');
  panel.classList.add('visible');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('visible');
  document.querySelectorAll('.day-card').forEach(c=>c.classList.remove('selected'));
}

/* ══════════════════════════════════════════════
   WEEK GRID
══════════════════════════════════════════════ */
function renderWeek(data){
  const daily=data.daily;
  const hourly=data.hourly;
  _hMap=buildHourlyMap(hourly.time);
  _data=data;

  document.getElementById('today-temp').textContent=Math.round(data.current.temperature_2m)+'°';
  document.getElementById('today-desc').textContent=getDesc(data.current.weather_code);
  document.getElementById('today-minmax').textContent=`${Math.round(daily.temperature_2m_min[0])}° — ${Math.round(daily.temperature_2m_max[0])}°`;
  document.getElementById('today-sunrise').textContent=fmtTime(daily.sunrise[0]);
  document.getElementById('today-sunset').textContent=fmtTime(daily.sunset[0]);

  requestAnimationFrame(()=>renderChart(daily,_hMap,hourly));

  const grid=document.getElementById('week-grid');
  grid.innerHTML='';
  closeDetail();

  daily.time.forEach((dateStr,i)=>{
    const d=new Date(dateStr+'T12:00:00');
    const isToday=i===0;
    const dayAbbr=isToday?'Auj.':DAYS_SHORT[d.getDay()];
    const dateLabel=`${d.getDate()} ${MONTHS[d.getMonth()]}`;
    const maxT=Math.round(daily.temperature_2m_max[i]);
    const minT=Math.round(daily.temperature_2m_min[i]);

    const noonKey=`${dateStr}T13:00`;
    const noonIdx=_hMap[noonKey];
    const domCode=noonIdx!=null?hourly.weather_code[noonIdx]:daily.weather_code[i];

    let momHTML='';
    MOMENTS.forEach(m=>{
      const key=`${dateStr}T${String(m.hour).padStart(2,'0')}:00`;
      const idx=_hMap[key];
      const temp=idx!=null?Math.round(hourly.temperature_2m[idx]):maxT;
      const code=idx!=null?hourly.weather_code[idx]:domCode;
      momHTML+=`<div class="dc-moment-row">
        <span class="dcm-label ${m.cls}">${m.label}</span>
        <span class="dcm-icon">${getIcon(code)}</span>
        <span class="dcm-temp">${temp}°</span>
      </div>`;
    });

    const card=document.createElement('div');
    card.className='day-card'+(isToday?' today':'');
    card.style.setProperty('--slot-tint',wmoTint(domCode));
    card.dataset.index=i;
    card.innerHTML=`
      <div class="dc-name">${dayAbbr}</div>
      <div class="dc-date">${dateLabel}</div>
      <div class="dc-minmax"><span class="dc-max">${maxT}°</span><span style="color:rgba(255,255,255,0.2)">|</span><span class="dc-min">${minT}°</span></div>
      <div class="dc-moments">${momHTML}</div>
      <div class="dc-sun">
        <div class="dc-sun-row">${SVG_RISE}&nbsp;${fmtTime(daily.sunrise[i])}</div>
        <div class="dc-sun-row">${SVG_SET}&nbsp;${fmtTime(daily.sunset[i])}</div>
      </div>`;

    card.addEventListener('click',()=>{
      const wasSelected=card.classList.contains('selected');
      document.querySelectorAll('.day-card').forEach(c=>c.classList.remove('selected'));
      if(wasSelected){closeDetail();return;}
      card.classList.add('selected');
      openDetail(i);
    });

    grid.appendChild(card);
  });
}

async function search(){
  const place=document.getElementById('place-input').value.trim();
  if(!place)return;
  hideError();showLoader();
  document.getElementById('weather-output').classList.remove('visible');
  try{
    const geo=await geocode(place);
    const tz=geo.timezone||'auto';
    const data=await fetchWeather(geo.latitude,geo.longitude,tz);
    document.getElementById('loc-name').textContent=geo.name||place;
    document.getElementById('loc-country').textContent=[geo.admin1,geo.country].filter(Boolean).join(', ');
    renderWeek(data);
    showOutput();
  }catch(e){
    showError(e.message||'Une erreur est survenue. Réessayez.');
  }finally{
    hideLoader();
  }
}

document.getElementById('search-btn').addEventListener('click',search);
document.getElementById('place-input').addEventListener('keydown',e=>{if(e.key==='Enter')search()});
document.getElementById('geo-btn').addEventListener('click',()=>{
  if(!('geolocation' in navigator)){showError('Géolocalisation non supportée.');return;}
  navigator.geolocation.getCurrentPosition(
    pos=>searchByCoords(pos.coords.latitude,pos.coords.longitude),
    ()=>showError('Position refusée ou indisponible.'),
    {timeout:6000,maximumAge:60000}
  );
});
document.getElementById('dp-close').addEventListener('click',()=>{
  closeDetail();
  document.getElementById('week-grid').scrollIntoView({behavior:'smooth',block:'nearest'});
});

/* Stars */
const starsEl=document.getElementById('stars');
for(let i=0;i<90;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2+.7;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--op:${(Math.random()*.55+.15).toFixed(2)};animation-delay:${(Math.random()*6).toFixed(1)}s`;
  starsEl.appendChild(s);
}

async function reverseGeocode(lat,lon){
  /* Open-Meteo geocoding doesn't do reverse, use nominatim */
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=fr`,
      {headers:{'Accept-Language':'fr'}});
    const d=await r.json();
    return d.address?.city || d.address?.town || d.address?.village || d.address?.county || null;
  }catch{return null}
}

async function searchByCoords(lat,lon){
  hideError();showLoader();
  document.getElementById('weather-output').classList.remove('visible');
  try{
    const cityName=await reverseGeocode(lat,lon);
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'auto';
    const data=await fetchWeather(lat,lon,tz);
    const label=cityName||`${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;
    document.getElementById('place-input').value=label;
    document.getElementById('loc-name').textContent=label;
    document.getElementById('loc-country').textContent='Position actuelle';
    renderWeek(data);
    showOutput();
  }catch(e){
    showError(e.message||'Erreur de géolocalisation.');
  }finally{
    hideLoader();
  }
}

window.addEventListener('load',()=>{
  if('geolocation' in navigator){
    navigator.geolocation.getCurrentPosition(
      pos=>searchByCoords(pos.coords.latitude, pos.coords.longitude),
      ()=>{ /* refusé ou timeout → Paris par défaut */
        document.getElementById('place-input').value='Paris';
        search();
      },
      {timeout:6000, maximumAge:300000}
    );
  } else {
    document.getElementById('place-input').value='Paris';
    search();
  }
});
</script>
